<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>インスリン量の計算</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@100..900&display=swap" rel="stylesheet">
   


    <link rel="stylesheet" href="style.css">
    
   
   
</head>
<body>
     
       <h1>インスリン量の計算 </h1>
       
       
     
      <form class="diet_form">
       <dl>
     
        <h2 style="font-size: 16px"> インスリン量の計算</h2> 
      <!--  
           <p class="UP_SP2" style="font-size: 12px ; line-height: 16px"></p>
           
           目標血糖値は、<span class="highlight" id="result"></span>です。<br>
        -->
           <div class="label-container2">

           <div>
             <label style="font-size: 14px">炭水化物(g)：</label> 
             <input id="carbo" class="box" type="number" step="0.1" placeholder="数字"  > 
           </div>


            
           <div class="UP_SP1"  >
             <label style="font-size: 14px">カーボ比：</label> 
            
             <select  id="carbor"  class="options">
             <option value="0">選択</option>
             <option value="1.2">朝：1.2</option>
             <option value="1.0">部朝：1.0</option>
             <option value="0.6">昼夜：0.6</option>
             <option value="0.5">おやつ：0.5</option>
            </select>
            
           </div>
      
           
           
           <div class="UP_SP1"  >
            <label style="font-size: 14px" > 測定血糖値： </label>   
            <input id="mbgl" class="box" type="number" >
           </div>
           
           <div class="UP_SP1"  >
             <label style="font-size: 14px">インスリン効果値：</label> 
            
             <select  id="carbor2"  class="options">
             <option value="50">50</option>
             <option value="70">寝る前：70</option>
             
            </select>
            
           </div>
      



           <div>
             <input id="calculate"   class="calc-btn1"   type="button" value="インスリン量計算">

           </div>
            <br>
           <div class="UP_SP1"  >
             <span class="highlight2" id="result16">合計インスリン単位</span>
             
            
           </div>

          </div>
          
       </dl>
      </form>
         
      <br>
      <form class="diet_form2">
         <div class="box-011">
           <span>◎食事の計算式</span>
           <p class="highlight1" id="result10">カーボ：</p>
            <p class="highlight1" id="result11">インスリン単位：</p>
         </div>
      
         <div class="box-011">
           <span>◎補正の計算式</span>
           <p class="highlight1" id="result12">下げたい値：</p>
            <p class="highlight1" id="result13">補正単位：</p>
         </div>
        
          <div class="box-011">
           <span>◎インスリン量補足情報</span>
           <p class="highlight1" id="result14">計算後単位：</p>
            <p class="highlight1" id="result15">修正後単位：</p>
         </div>
 
         
          </div>
      </form>

     <p><small>正確性および完全性を保証するものではありません。<br>
        当該情報に基づいて被ったいかなる損害について、<br>
        一切責任を負うものではございませんのであらかじめご了承ください。</small></p>
    </dl>
    
     
         

   





    <script src="script.js"></script>
</body>
</html>
